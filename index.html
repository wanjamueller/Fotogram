<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>

        <link rel="icon" href="./assets/icons/favicon.png" type="image/x-icon" />

        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="./styles/variables.css" />
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/header.css" />
        <link rel="stylesheet" href="./styles/footer.css" />
        <script defer src="templates.js"></script>
        <script defer src="script.js"></script>
    </head>
    <body onload="renderPictures()">
        <header>
            <img src="./assets/img/fotogram_logo.svg" alt="fotogram-logo" />
        </header>
        <main>
            <h1 tabindex="0">Your personal photo album</h1>
            <section class="container" id="container"></section>
            <dialog tabindex="0" id="image-dialog"></dialog>
        </main>

        <footer class="footer-main">
            <img class="show_image" src="./assets/img/da_logo.svg" alt="developer-akademie-logo" />
            <p>© 2023 Developer Akademie GmbH</p>
        </footer>
    </body>
</html>
